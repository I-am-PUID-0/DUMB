name: Help request
description: Ask for help with DUMB backend setup, configuration, or troubleshooting.
title: "[HELP] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form when you need help operating or troubleshooting the DUMB backend.

        If you already have a clear defect with reproducible behavior, use the bug report template instead. For security issues, do not open a public issue.
  - type: checkboxes
    id: duplicate-check
    attributes:
      label: Duplicate check
      options:
        - label: I searched existing issues and discussions and did not find the same question.
          required: true
  - type: checkboxes
    id: preflight
    attributes:
      label: Before submitting, I have
      options:
        - label: Reviewed the relevant DUMB docs.
          required: true
        - label: Checked my DUMB configuration and environment for obvious mistakes.
          required: true
        - label: Re-tested on the latest applicable DUMB release, image tag, or branch head.
          required: true
        - label: Collected logs, screenshots, or commands that show the current state.
          required: true
  - type: textarea
    id: goal
    attributes:
      label: What are you trying to do?
      description: Describe the workflow, setup step, or outcome you are trying to achieve.
    validations:
      required: true
  - type: textarea
    id: blocked
    attributes:
      label: Where are you stuck?
      description: Explain what is failing, confusing, or unclear.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Which backend area does this involve?
      multiple: false
      options:
        - Initial setup / onboarding
        - Config editing / validation
        - Service install / update
        - Service start / dependency chain
        - Embedded UI proxying
        - Authentication / access
        - Symlink tooling
        - Other / unsure
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: How are you running DUMB?
      multiple: false
      options:
        - Docker container
        - Docker Compose
        - Dev container
        - Local source checkout
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: DUMB version / image tag / branch marker
      description: Include the exact version you are running (for example `latest`, `vX.Y.Z`, or `dev-<shortSHA>`).
      placeholder: latest
    validations:
      required: true
  - type: input
    id: host-os
    attributes:
      label: Host OS / platform
      description: Include your host OS and version.
      placeholder: Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: services
    attributes:
      label: Relevant services
      description: List the DUMB-managed service(s) involved, if any.
      placeholder: dmbdb, sonarr, rclone
    validations:
      required: false
  - type: textarea
    id: tried
    attributes:
      label: What have you already tried?
      description: Include docs pages followed, config changes, commands run, or workarounds attempted.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste logs, error output, or API responses that help explain the current state. Remove secrets first.
      render: shell
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add screenshots, links, config snippets, or anything else that would help someone diagnose this faster.
    validations:
      required: false
