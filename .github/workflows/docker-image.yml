name: Docker Image CI
env:
  DOCKER_BUILD_RECORD_UPLOAD: false
on:
  workflow_dispatch:
  pull_request:
    types:
      - closed
    paths-ignore:
      - '**/README.md'
      - '.github/**'
      - '.gitattributes'
      - '.gitignore'

concurrency:
  # Both architecture pools use shared host-local Docker/cache resources. Do not
  # let dev and release builds contend with each other on the same servers.
  group: ${{ github.workflow }}-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  setup:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'chore(master): release '))
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.setup_env_vars.outputs.VERSION }}
      REPO_OWNER_LOWER: ${{ steps.setup_env_vars.outputs.REPO_OWNER_LOWER }}
      REPO_NAME: ${{ steps.setup_env_vars.outputs.REPO_NAME }}
      BRANCH_NAME: ${{ steps.setup_env_vars.outputs.BRANCH_NAME }}
      DEV_VERSION: ${{ steps.setup_env_vars.outputs.DEV_VERSION }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Extract version and set environment variables
        id: setup_env_vars        
        run: |
          VERSION=$(grep -E '^version *= *' pyproject.toml | head -n 1 | cut -d '"' -f2)
          REPO_OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(basename "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          BRANCH_NAME=$(echo "${{ github.ref_name }}" | tr '/' '-')
          DEV_VERSION=""
          if [ "${{ github.ref_name }}" = "dev" ]; then
            LAST_TAG=$(git tag -l --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)
            if [ -n "$LAST_TAG" ]; then
              DEV_COUNT=$(git rev-list --count "${LAST_TAG}..HEAD")
            else
              DEV_COUNT=$(git rev-list --count HEAD)
            fi
            DEV_VERSION="${VERSION}-dev.${DEV_COUNT}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "REPO_OWNER_LOWER=$REPO_OWNER_LOWER" >> $GITHUB_OUTPUT
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "DEV_VERSION=$DEV_VERSION" >> $GITHUB_OUTPUT

  fetch-latest-tags:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'chore(master): release '))
    runs-on: ubuntu-latest
    outputs:
      SYS_STATS_TAG: ${{ steps.resolve_inputs.outputs.SYS_STATS_TAG }}
      ZILEAN_TAG: ${{ steps.resolve_inputs.outputs.ZILEAN_TAG }}
      DUMB_FRONTEND_TAG: ${{ steps.resolve_inputs.outputs.DUMB_FRONTEND_TAG }}
      CLI_DEBRID_TAG: ${{ steps.resolve_inputs.outputs.CLI_DEBRID_TAG }}
      RCLONE_TAG: ${{ steps.resolve_inputs.outputs.RCLONE_TAG }}
      ZURG_REF: ${{ steps.resolve_inputs.outputs.ZURG_REF }}
      GO_VERSION: ${{ steps.resolve_inputs.outputs.GO_VERSION }}
      NPM_VERSION: ${{ steps.resolve_inputs.outputs.NPM_VERSION }}
      PNPM_VERSION: ${{ steps.resolve_inputs.outputs.PNPM_VERSION }}
      PGADMIN_VERSION: ${{ steps.resolve_inputs.outputs.PGADMIN_VERSION }}
      POETRY_VERSION: ${{ steps.resolve_inputs.outputs.POETRY_VERSION }}
      APT_REFRESH: ${{ steps.resolve_inputs.outputs.APT_REFRESH }}
    steps:
      - name: Resolve reproducible build inputs
        id: resolve_inputs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -Eeuo pipefail

          github_api() {
            curl --fail --silent --show-error --location \
              --retry 3 --retry-all-errors \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$1"
          }

          latest_tag() {
            github_api "https://api.github.com/repos/$1/releases/latest" | jq -er '.tag_name'
          }

          public_json() {
            curl --fail --silent --show-error --location \
              --retry 3 --retry-all-errors \
              -H "Accept: application/json" \
              "$1"
          }

          SYS_STATS_TAG=$(latest_tag EnterpriseDB/system_stats)
          ZILEAN_TAG=$(latest_tag iPromKnight/zilean)
          DUMB_FRONTEND_TAG=$(latest_tag nicocapalbo/dmbdb)
          CLI_DEBRID_TAG=$(latest_tag godver3/cli_debrid)
          RCLONE_RELEASE=$(latest_tag rclone/rclone)
          RCLONE_TAG=${RCLONE_RELEASE#v}
          ZURG_REF=$(github_api https://api.github.com/repos/debridmediamanager/zurg-testing/commits/main | jq -er '.sha')
          GO_VERSION=$(public_json 'https://go.dev/dl/?mode=json' | jq -er '.[0].version | sub("^go"; "")')
          NPM_VERSION=$(public_json https://registry.npmjs.org/npm | \
            jq -r '.versions | keys[] | select(test("^12\\.[0-9]+\\.[0-9]+$"))' | sort -V | tail -n 1)
          PNPM_VERSION=$(public_json https://registry.npmjs.org/pnpm | jq -er '.["dist-tags"]["latest-10"]')
          PGADMIN_VERSION=$(public_json https://pypi.org/pypi/pgadmin4/json | jq -er '.info.version')
          POETRY_VERSION=$(public_json https://pypi.org/pypi/poetry/json | jq -er '.info.version')
          APT_REFRESH=$(date -u +%Y-%m-%d)

          for name in SYS_STATS_TAG ZILEAN_TAG DUMB_FRONTEND_TAG CLI_DEBRID_TAG RCLONE_TAG ZURG_REF \
            GO_VERSION NPM_VERSION PNPM_VERSION PGADMIN_VERSION POETRY_VERSION APT_REFRESH; do
            value=${!name}
            [[ -n "$value" && "$value" != "null" ]] || { echo "Failed to resolve $name" >&2; exit 1; }
            echo "$name=$value" >> "$GITHUB_OUTPUT"
          done

  build-amd64-digest:
    name: Build linux/amd64 → Docker Hub (by digest)
    needs: [setup, fetch-latest-tags]
    runs-on: [ self-hosted, Linux, X64 ]
    timeout-minutes: 120
    permissions: { contents: read, packages: write }
    env:
      REPO_NAME:        ${{ needs.setup.outputs.REPO_NAME }}
      DOCKER_USER:      ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASS:      ${{ secrets.DOCKER_PASSWORD }}
      BRANCH_NAME:      ${{ needs.setup.outputs.BRANCH_NAME }}
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Login (Docker Hub)
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_PASS }}

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          name: ci
          cleanup: false
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 4

      - name: Build & push by digest (amd64) with cache
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          target: final-stage
          platforms: linux/amd64
          push: true
          outputs: type=registry,name=docker.io/${{ env.DOCKER_USER }}/${{ env.REPO_NAME }},push-by-digest=true,oci-mediatypes=true,compression=zstd
          provenance: true
          sbom: ${{ github.ref_name == 'master' }}
          build-args: |
            SYS_STATS_TAG=${{ needs.fetch-latest-tags.outputs.SYS_STATS_TAG }}
            ZILEAN_TAG=${{ needs.fetch-latest-tags.outputs.ZILEAN_TAG }}
            DUMB_FRONTEND_TAG=${{ needs.fetch-latest-tags.outputs.DUMB_FRONTEND_TAG }}
            CLI_DEBRID_TAG=${{ needs.fetch-latest-tags.outputs.CLI_DEBRID_TAG }}
            RCLONE_TAG=${{ needs.fetch-latest-tags.outputs.RCLONE_TAG }}
            ZURG_REF=${{ needs.fetch-latest-tags.outputs.ZURG_REF }}
            GO_VERSION=${{ needs.fetch-latest-tags.outputs.GO_VERSION }}
            NPM_VERSION=${{ needs.fetch-latest-tags.outputs.NPM_VERSION }}
            PNPM_VERSION=${{ needs.fetch-latest-tags.outputs.PNPM_VERSION }}
            PGADMIN_VERSION=${{ needs.fetch-latest-tags.outputs.PGADMIN_VERSION }}
            POETRY_VERSION=${{ needs.fetch-latest-tags.outputs.POETRY_VERSION }}
            APT_REFRESH=${{ needs.fetch-latest-tags.outputs.APT_REFRESH }}
            DEV_VERSION=${{ needs.setup.outputs.DEV_VERSION }}

  build-arm64-digest:
    name: Build linux/arm64 → Docker Hub (by digest)
    needs: [setup, fetch-latest-tags]
    runs-on: [ self-hosted, Linux, ARM64 ]
    timeout-minutes: 120
    permissions: { contents: read, packages: write }
    env:
      REPO_NAME:        ${{ needs.setup.outputs.REPO_NAME }}
      DOCKER_USER:      ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASS:      ${{ secrets.DOCKER_PASSWORD }}
      BRANCH_NAME:      ${{ needs.setup.outputs.BRANCH_NAME }}
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Login (Docker Hub)
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_PASS }}

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          name: ci
          cleanup: false
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 8

      - name: Build & push by digest (arm64) with cache
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          target: final-stage
          platforms: linux/arm64
          push: true
          outputs: type=registry,name=docker.io/${{ env.DOCKER_USER }}/${{ env.REPO_NAME }},push-by-digest=true,oci-mediatypes=true,compression=zstd
          provenance: true
          sbom: ${{ github.ref_name == 'master' }}
          build-args: |
            SYS_STATS_TAG=${{ needs.fetch-latest-tags.outputs.SYS_STATS_TAG }}
            ZILEAN_TAG=${{ needs.fetch-latest-tags.outputs.ZILEAN_TAG }}
            DUMB_FRONTEND_TAG=${{ needs.fetch-latest-tags.outputs.DUMB_FRONTEND_TAG }}
            CLI_DEBRID_TAG=${{ needs.fetch-latest-tags.outputs.CLI_DEBRID_TAG }}
            RCLONE_TAG=${{ needs.fetch-latest-tags.outputs.RCLONE_TAG }}
            ZURG_REF=${{ needs.fetch-latest-tags.outputs.ZURG_REF }}
            GO_VERSION=${{ needs.fetch-latest-tags.outputs.GO_VERSION }}
            NPM_VERSION=${{ needs.fetch-latest-tags.outputs.NPM_VERSION }}
            PNPM_VERSION=${{ needs.fetch-latest-tags.outputs.PNPM_VERSION }}
            PGADMIN_VERSION=${{ needs.fetch-latest-tags.outputs.PGADMIN_VERSION }}
            POETRY_VERSION=${{ needs.fetch-latest-tags.outputs.POETRY_VERSION }}
            APT_REFRESH=${{ needs.fetch-latest-tags.outputs.APT_REFRESH }}
            DEV_VERSION=${{ needs.setup.outputs.DEV_VERSION }}

  build-and-push:
    needs: [setup, fetch-latest-tags, build-amd64-digest, build-arm64-digest]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REPO_NAME:        ${{ needs.setup.outputs.REPO_NAME }}
      REPO_OWNER_LOWER: ${{ needs.setup.outputs.REPO_OWNER_LOWER }}
      VERSION:          ${{ needs.setup.outputs.VERSION }}
      BRANCH_NAME:      ${{ needs.setup.outputs.BRANCH_NAME }}
      DOCKER_USER:      ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASS:      ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Determine Docker tags
        id: determine_tags
        run: |
          if [ "${{ github.ref_name }}" = "master" ]; then
            echo "DH_VERSION=docker.io/${{ env.DOCKER_USER }}/${{ env.REPO_NAME }}:${{ env.VERSION }}"    >> $GITHUB_ENV
            echo "DH_LATEST=docker.io/${{ env.DOCKER_USER }}/${{ env.REPO_NAME }}:latest"                >> $GITHUB_ENV
            echo "GH_VERSION=ghcr.io/${{ env.REPO_OWNER_LOWER }}/${{ env.REPO_NAME }}:${{ env.VERSION }}" >> $GITHUB_ENV
            echo "GH_LATEST=ghcr.io/${{ env.REPO_OWNER_LOWER }}/${{ env.REPO_NAME }}:latest"             >> $GITHUB_ENV
          else
            echo "DH_VERSION=docker.io/${{ env.DOCKER_USER }}/${{ env.REPO_NAME }}:${{ env.BRANCH_NAME }}"    >> $GITHUB_ENV
            echo "DH_LATEST=" >> $GITHUB_ENV
            echo "GH_VERSION=ghcr.io/${{ env.REPO_OWNER_LOWER }}/${{ env.REPO_NAME }}:${{ env.BRANCH_NAME }}" >> $GITHUB_ENV
            echo "GH_LATEST=" >> $GITHUB_ENV
          fi

      - name: Login (Docker Hub)
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_PASS }}

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Create multi-arch manifest on Docker Hub
        run: |
          AMD="docker.io/${{ env.DOCKER_USER }}/${{ env.REPO_NAME }}@${{ needs.build-amd64-digest.outputs.digest }}"
          ARM="docker.io/${{ env.DOCKER_USER }}/${{ env.REPO_NAME }}@${{ needs.build-arm64-digest.outputs.digest }}"

          # Version tag
          docker buildx imagetools create \
            --tag "$DH_VERSION" \
            "$AMD" "$ARM"

          # Optional latest on master
          if [ -n "$DH_LATEST" ]; then
            docker buildx imagetools create \
              --tag "$DH_LATEST" \
              "$AMD" "$ARM"
          fi

      - name: Login (GHCR)
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Mirror tags to GHCR (from Docker Hub manifest)
        run: |
          docker buildx imagetools create --tag "$GH_VERSION" "$DH_VERSION"
          if [ -n "$GH_LATEST" ]; then
            docker buildx imagetools create --tag "$GH_LATEST" "$DH_LATEST"
          fi

      - name: Select tag for IMAGE_TAG (for inspection)
        run: |
          echo "IMAGE_TAG=$DH_VERSION" >> "$GITHUB_ENV"

      - name: Pull image for version extraction
        run: |
          docker pull --platform=linux/amd64 "$IMAGE_TAG"
          docker tag "$IMAGE_TAG" temp-local-image

      - name: Extract Versions from Image
        env:
          IMAGE_TAG: temp-local-image
        run: |
          CONTAINER_ID=$(docker run -d --rm --entrypoint /bin/sh $IMAGE_TAG -c "sleep 60")
          PSQL_VERSION=$(docker exec $CONTAINER_ID psql --version | awk '{print $3}')
          PGADMIN_VERSION=$(docker exec $CONTAINER_ID /pgadmin/venv/bin/python -c "import importlib.metadata; print(importlib.metadata.version('pgadmin4'))" 2>/dev/null || echo "Not Installed")
          NODE_VERSION=$(docker exec $CONTAINER_ID node -v 2>/dev/null || echo "Not Installed")
          PNPM_VERSION=$(docker exec $CONTAINER_ID pnpm -v 2>/dev/null || echo "Not Installed")
          RCLONE_VERSION=$(docker exec $CONTAINER_ID rclone version | head -n 1 | grep -oP 'v[0-9]+\.[0-9]+\.[0-9]+' 2>/dev/null || echo "Not Installed")
          if [[ "$NODE_VERSION" != v24.* ]]; then
            echo "Expected Node.js 24.x in the release image, found: $NODE_VERSION" >&2
            docker stop $CONTAINER_ID
            exit 1
          fi
          echo "PSQL_VERSION=$PSQL_VERSION" >> $GITHUB_ENV
          echo "PGADMIN_VERSION=$PGADMIN_VERSION" >> $GITHUB_ENV
          echo "NODE_VERSION=$NODE_VERSION" >> $GITHUB_ENV
          echo "PNPM_VERSION=$PNPM_VERSION" >> $GITHUB_ENV
          echo "RCLONE_VERSION=$RCLONE_VERSION" >> $GITHUB_ENV
          docker stop $CONTAINER_ID
          docker rmi -f temp-local-image
          docker image prune -f

      - name: Add Job Summary for Build
        env:
          DOCKER_TAGS_ALL: ${{ env.DH_VERSION }}${{ env.DH_LATEST && ', ' || '' }}${{ env.DH_LATEST }}${{ env.GH_VERSION && ', ' || '' }}${{ env.GH_VERSION }}${{ env.GH_LATEST && ', ' || '' }}${{ env.GH_LATEST }}
          VERSION: ${{ env.VERSION }}
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Build Version:** \`${{ env.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Git Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Tags:**" >> $GITHUB_STEP_SUMMARY
          echo "\`${DOCKER_TAGS_ALL}\`" >> $GITHUB_STEP_SUMMARY

  cleanup-cache:
    name: Prune persistent BuildKit and legacy local cache
    needs: [ setup, build-amd64-digest, build-arm64-digest ]
    if: >
      always() &&
      (github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'chore(master): release ')))
    strategy:
      matrix:
        arch: [ X64, ARM64 ]
    runs-on: [ "self-hosted", "Linux", "${{ matrix.arch }}" ]
    steps:
      - name: Prune old persistent BuildKit records
        shell: bash
        env:
          BUILDER_NAME: ci
        run: |
          set -Eeuo pipefail
          if ! docker buildx inspect "${BUILDER_NAME}" >/dev/null 2>&1; then
            echo "Builder ${BUILDER_NAME} does not exist yet; nothing to prune"
            exit 0
          fi
          docker buildx du --builder "${BUILDER_NAME}"
          docker buildx prune --builder "${BUILDER_NAME}" --force --filter until=168h
          docker buildx du --builder "${BUILDER_NAME}"

      - name: Ensure tools are present
        shell: bash
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y jq
          fi

      - name: Show cache size → prune → show again
        shell: bash
        env:
          KEEP_MANIFESTS: "1"
          MAX_DELETE_RATIO: "0.60"
          DRY_RUN: "false"
        run: |
          set -Eeuo pipefail
          shopt -s nullglob
          set -x
          trap '{
            >&2 echo "❌ Failed at line $LINENO: $BASH_COMMAND";
            if [[ -n "${STAGE_DIR:-}" ]]; then
              >&2 echo "📂 Dump of $STAGE_DIR"
              ls -la "${STAGE_DIR}" || true
            fi
          }' ERR

          ROOT_BASE="${RUNNER_CACHE_ROOT:-/home/docker/buildx-cache}"
          ROOT="${ROOT_BASE}/${GITHUB_REPOSITORY}"
          LOCK="${ROOT_BASE}/.prune.lock"

          echo "🖥️ Host: $(hostname) | Label: ${{ matrix.arch }}"
          echo "📁 Cache root: $ROOT"

          [[ -d "$ROOT/unified" ]] || { echo "No unified cache — nothing to prune."; exit 0; }

          echo "📊 Cache *before* prune:"
          du -x -h --max-depth=1 "$ROOT" | sort -hr | head -n 20 || true

          exec 9>"$LOCK"
          flock -x 9

          JQ_SLICE='def clamp0(x): if x < 0 then 0 else x end;
            ( .manifests // [] ) as $m
            | ($m|length) as $L
            | (if $L==0 then [] else $m[(clamp0($L-($n))):$L] end)
            | .[]? | (.digest // empty) | sub("^sha256:";"")'

          for STAGE_DIR in "$ROOT/unified/" ; do
            [[ -f "${STAGE_DIR}index.json" ]] || continue
            echo "::group::⏳  Pruning $(basename "$STAGE_DIR")"

            BLOBS_DIR="${STAGE_DIR}blobs/sha256"
            if [[ ! -d "$BLOBS_DIR" ]]; then
              echo "ℹ️  No blobs dir — skip."
              echo "::endgroup::"
              continue
            fi

            KEEP="$(mktemp)"; REACH="$(mktemp)"

            if ! mapfile -t MANIFESTS < <(jq -r --argjson n "${KEEP_MANIFESTS}" "$JQ_SLICE" "${STAGE_DIR}index.json"); then
              echo "⚠️  jq failed parsing index.json — skip stage."
              rm -f "$KEEP" "$REACH"
              echo "::endgroup::"
              continue
            fi
            if (( ${#MANIFESTS[@]} == 0 )); then
              echo "⚠️  No manifests found — skip stage."
              rm -f "$KEEP" "$REACH"
              echo "::endgroup::"
              continue
            fi

            printf "%s\n" "${MANIFESTS[@]}" > "$KEEP"

            for M in "${MANIFESTS[@]}"; do
              M_BLOB="${BLOBS_DIR}/${M}"
              if [[ ! -f "$M_BLOB" ]]; then
                echo "⚠️  Missing manifest blob: $M_BLOB"
                continue
              fi
              jq -r '.. | .digest? | select(type=="string") | sub("^sha256:";"")' "$M_BLOB"
            done | sort -u > "$REACH"

            cat "$REACH" >> "$KEEP"
            sort -u -o "$KEEP" "$KEEP"
            grep -E '^[0-9a-f]{64}$' -x "$KEEP" > "${KEEP}.hex" || true
            mv -f "${KEEP}.hex" "$KEEP"

            if [[ ! -s "$KEEP" ]]; then
              echo "⚠️  Empty KEEP set — skip stage."
              rm -f "$KEEP" "$REACH"
              echo "::endgroup::"
              continue
            fi

            ALL_LIST="$(mktemp)"
            find "$BLOBS_DIR" -type f -printf '%f\n' | sort -u > "$ALL_LIST"

            if [[ ! -s "$ALL_LIST" ]]; then
              echo "ℹ️  No blobs present."
              rm -f "$KEEP" "$REACH" "$ALL_LIST"
              echo "::endgroup::"
              continue
            fi

            DEL_LIST="$(mktemp)"
            comm -23 "$ALL_LIST" "$KEEP" > "$DEL_LIST" || true
            TOTAL=$(wc -l < "$ALL_LIST" || echo 0)
            TO_DEL=$(wc -l < "$DEL_LIST" || echo 0)
            MAX_DELETE_RATIO="${MAX_DELETE_RATIO}"
            RATIO=$(awk -v a="$TO_DEL" -v b="$TOTAL" 'BEGIN{ if(b==0) print 0; else printf "%.2f", a/b }')
            awk -v r="$RATIO" -v m="$MAX_DELETE_RATIO" 'BEGIN{ exit !(r>m) }' && {
              echo "⚠️  Delete ratio $RATIO exceeds max $MAX_DELETE_RATIO — skipping to avoid wipe."
              rm -f "$KEEP" "$REACH" "$ALL_LIST" "$DEL_LIST"
              echo "::endgroup::"
              continue
            }

            TOTAL_BEFORE=$(du -sBK "$STAGE_DIR" | awk '{print $1}')

            if [[ "${DRY_RUN}" == "true" ]]; then
              echo "🔎 DRY-RUN: would delete $TO_DEL / $TOTAL blobs (ratio $RATIO)."
            else
              while IFS= read -r f; do
                [[ -n "$f" ]] || continue
                rm -f -- "$BLOBS_DIR/$f" 2>/dev/null || true
              done < "$DEL_LIST"
            fi

            rm -f "$KEEP" "$REACH" "$ALL_LIST" "$DEL_LIST"
            TOTAL_AFTER=$(du -sBK "$STAGE_DIR" | awk '{print $1}')
            echo "🧹 $(basename "$STAGE_DIR"): ${TOTAL_BEFORE} → ${TOTAL_AFTER}"
            echo "::endgroup::"
          done

          echo "📊 Cache *after* prune:"
          du -x -h --max-depth=1 "$ROOT" | sort -hr | head -n 20 || true
          flock -u 9 || true

  release:
    needs: [setup, build-and-push]
    if: github.ref_name == 'master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_exists: ${{ steps.check_release.outputs.release_exists }}
    env:
      VERSION: ${{ needs.setup.outputs.VERSION }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check if Release Exists
        id: check_release
        run: |
            if gh release view "${{ env.VERSION }}" --repo ${{ github.repository }}; then
              echo "Release already exists for version ${{ env.VERSION }}"
              echo "release_exists=true" >> $GITHUB_ENV
              echo "release_exists=true" >> $GITHUB_OUTPUT
            else
              echo "Release does not exist for version ${{ env.VERSION }}"
              echo "release_exists=false" >> $GITHUB_ENV
              echo "release_exists=false" >> $GITHUB_OUTPUT
            fi
      - name: Create Release with CHANGELOG Notes
        if: steps.check_release.outputs.release_exists == 'false'
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
            RELEASE_NOTES=$(sed -n '/^## \[[0-9]\+\.[0-9]\+\.[0-9]\+\](/,$p' CHANGELOG.md | sed -n '1!{/^## \[/q;p}')
            gh release create ${{ env.VERSION }} \
              --repo ${{ github.repository }} \
              --target "${GITHUB_SHA}" \
              --title "Release ${{ env.VERSION }}" \
              --notes "$RELEASE_NOTES" \
              --draft=false \
              --prerelease=false

      - name: Add Job Summary for Release
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Release Version:** \`${{ env.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Release Status:** ${{ steps.check_release.outputs.release_exists == 'false' && '✅ Created' || '⚠️ Skipped (Already Exists)' }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_release.outputs.release_exists }}" == "false" ]; then
            echo "**Release Notes:**" >> $GITHUB_STEP_SUMMARY
            sed -n '/^## \[[0-9]\+\.[0-9]\+\.[0-9]\+\](/,$p' CHANGELOG.md | sed -n '1!{/^## \[/q;p}' >> $GITHUB_STEP_SUMMARY
          fi

  announce:
    needs: [release, build-and-push, setup]
    if: needs.release.outputs.release_exists == 'false' && github.ref_name == 'master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Post announcement to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ needs.setup.outputs.VERSION }}
        run: |
          RELEASE_NOTES=$(sed -n '/^## \[[0-9]\+\.[0-9]\+\.[0-9]\+\](/,$p' CHANGELOG.md | sed -n '1!{/^## \[/q;p}')
          ANNOUNCEMENT_BODY="<@&1360241608649605240> 🚀 **New Release: Version [${{ env.VERSION }}]**${RELEASE_NOTES}"
          ESCAPED_BODY=$(echo "$ANNOUNCEMENT_BODY" | jq -Rsa .)
          curl -H "Content-Type: application/json" \
               -d "{\"content\": $ESCAPED_BODY, \"flags\": 4}" \
               $DISCORD_WEBHOOK_URL

  announce-dev:
    needs: [build-and-push, setup]
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code (full history)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Post dev announcement to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ needs.setup.outputs.VERSION }}
          DEV_VERSION: ${{ needs.setup.outputs.DEV_VERSION }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -Eeuo pipefail

          DEV_TAG="dev-build"
          BASE_LABEL="Changes since last dev build"

          if git rev-parse -q --verify "refs/tags/${DEV_TAG}" >/dev/null; then
            RANGE="${DEV_TAG}..HEAD"
          else
            BASE_LABEL=""
            if LAST_TAG=$(gh release view --json tagName -q .tagName --repo "${{ github.repository }}" 2>/dev/null); then
              RANGE="${LAST_TAG}..HEAD"
              BASE_LABEL="Changes since Release ${LAST_TAG}"
            else
              RANGE=""
              BASE_LABEL="Changes since initial commit"
            fi
          fi

          COMMITS=$(git log ${RANGE} --pretty=format:"- %s ([%h](https://github.com/${REPO}/commit/%H))")
          if [[ -z "${COMMITS}" ]]; then
            COMMITS="- (no new commits since last release)"
          fi

          export COMMITS BASE_LABEL
          ANNOUNCEMENT_BODY=" <@&1360221114541805578> $(python -c 'import os; version=os.environ.get("DEV_VERSION") or os.environ.get("VERSION","dev"); commits=os.environ.get("COMMITS","").strip(); base=os.environ.get("BASE_LABEL","").strip(); header=f"🛠️ **Dev Branch Update** (version `{version}`)\n"; label=(f"{base}\n" if base else ""); body=header+label+commits; max_len=1900; print(body[:max_len-3].rstrip()+"..." if len(body)>max_len else body)')"

          ESCAPED_BODY=$(echo "$ANNOUNCEMENT_BODY" | jq -Rsa .)
          curl -H "Content-Type: application/json" \
               -d "{\"content\": $ESCAPED_BODY, \"flags\": 4}" \
               $DISCORD_WEBHOOK_URL

      - name: Update dev build tag
        if: success()
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f dev-build
          git push -f origin dev-build
          
  update-pr-label:
    needs: release
    if: needs.release.outputs.release_exists == 'false' && github.ref_name == 'master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Remove 'autorelease: pending' label from all merged PRs"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBERS=$(gh pr list --state merged --base master --json number,labels --jq '[.[] | select(.labels[].name == "autorelease: pending") | .number] | @sh')
          
          if [[ -n "$PR_NUMBERS" ]]; then
            for PR_NUMBER in $PR_NUMBERS; do
              PR_NUMBER=$(echo $PR_NUMBER | tr -d "'") # Remove quotes from jq output
              echo "Updating PR #$PR_NUMBER..."
              gh pr edit $PR_NUMBER --remove-label "autorelease: pending"
              gh pr edit $PR_NUMBER --add-label "autorelease: tagged"
              echo "Updated PR #$PR_NUMBER with 'autorelease: tagged'"
            done
          else
            echo "No merged PRs found with 'autorelease: pending' label."
          fi
